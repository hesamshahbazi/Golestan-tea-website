<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" fill="none">
  <defs>
    <linearGradient id="body-cg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a1800"/>
      <stop offset="50%" stop-color="#4a2e05"/>
      <stop offset="100%" stop-color="#2a1800"/>
    </linearGradient>
    <linearGradient id="lid-cg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e1200"/>
      <stop offset="50%" stop-color="#382200"/>
      <stop offset="100%" stop-color="#1e1200"/>
    </linearGradient>
    <radialGradient id="glow-cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A961" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C9A961" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-cg" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="150" cy="300" rx="80" ry="40" fill="url(#glow-cg)" opacity="0.5"/>

  <!-- Tin body -->
  <rect x="58" y="90" width="184" height="290" rx="6" fill="url(#body-cg)" filter="url(#shadow-cg)"/>

  <!-- Lid -->
  <rect x="44" y="62" width="212" height="36" rx="5" fill="url(#lid-cg)"/>
  <rect x="56" y="72" width="188" height="18" rx="3" fill="#1e1200"/>

  <!-- Gold accent lines -->
  <rect x="44" y="96" width="212" height="2" fill="#C9A961" opacity="0.95"/>
  <rect x="44" y="374" width="212" height="2" fill="#C9A961" opacity="0.95"/>
  <rect x="58" y="130" width="184" height="0.75" fill="#C9A961" opacity="0.5"/>
  <rect x="58" y="328" width="184" height="0.75" fill="#C9A961" opacity="0.5"/>

  <!-- Label panel -->
  <rect x="70" y="142" width="160" height="168" rx="2" fill="rgba(0,0,0,0.25)"/>
  <rect x="70" y="142" width="160" height="168" rx="2" stroke="#C9A961" stroke-width="0.75" stroke-opacity="0.4"/>

  <!-- Diamond ornament -->
  <path d="M150 166 L170 210 L150 254 L130 210Z" stroke="#C9A961" stroke-width="0.5" stroke-opacity="0.3"/>
  <path d="M150 178 L162 210 L150 242 L138 210Z" stroke="#C9A961" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Honeycomb dots (representing honey) -->
  <circle cx="150" cy="210" r="6" fill="#C9A961" opacity="0.35"/>
  <circle cx="166" cy="200" r="4" fill="#C9A961" opacity="0.18"/>
  <circle cx="166" cy="220" r="4" fill="#C9A961" opacity="0.18"/>
  <circle cx="134" cy="200" r="4" fill="#C9A961" opacity="0.18"/>
  <circle cx="134" cy="220" r="4" fill="#C9A961" opacity="0.18"/>

  <!-- Golden tips suggestion (fine lines) -->
  <line x1="150" y1="170" x2="148" y2="184" stroke="#C9A961" stroke-width="0.75" opacity="0.4"/>
  <line x1="155" y1="172" x2="153" y2="186" stroke="#C9A961" stroke-width="0.75" opacity="0.3"/>
  <line x1="145" y1="172" x2="143" y2="186" stroke="#C9A961" stroke-width="0.75" opacity="0.3"/>

  <!-- Product name lines -->
  <rect x="100" y="256" width="100" height="1" fill="#C9A961" opacity="0.55"/>
  <rect x="114" y="262" width="72" height="0.5" fill="#C9A961" opacity="0.35"/>
  <rect x="122" y="284" width="56" height="0.75" fill="#C9A961" opacity="0.25"/>

  <!-- Lid pin dots -->
  <circle cx="58" cy="80" r="2" fill="#C9A961" opacity="0.65"/>
  <circle cx="242" cy="80" r="2" fill="#C9A961" opacity="0.65"/>

  <!-- Extra decorative bands -->
  <rect x="58" y="108" width="184" height="12" fill="rgba(201,169,97,0.04)"/>
  <rect x="58" y="350" width="184" height="12" fill="rgba(201,169,97,0.04)"/>
</svg>
