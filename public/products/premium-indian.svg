<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" fill="none">
  <defs>
    <linearGradient id="body-pi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#220a04"/>
      <stop offset="50%" stop-color="#3d1208"/>
      <stop offset="100%" stop-color="#220a04"/>
    </linearGradient>
    <linearGradient id="lid-pi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#190704"/>
      <stop offset="50%" stop-color="#2e0d06"/>
      <stop offset="100%" stop-color="#190704"/>
    </linearGradient>
    <radialGradient id="glow-pi" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B3A2A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B3A2A" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-pi" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="150" cy="300" rx="80" ry="40" fill="url(#glow-pi)" opacity="0.5"/>

  <!-- Tin body -->
  <rect x="58" y="90" width="184" height="290" rx="6" fill="url(#body-pi)" filter="url(#shadow-pi)"/>

  <!-- Lid -->
  <rect x="44" y="62" width="212" height="36" rx="5" fill="url(#lid-pi)"/>
  <rect x="56" y="72" width="188" height="18" rx="3" fill="#190704"/>

  <!-- Gold accent lines -->
  <rect x="44" y="96" width="212" height="1.5" fill="#C9A961" opacity="0.85"/>
  <rect x="44" y="374" width="212" height="1.5" fill="#C9A961" opacity="0.85"/>
  <rect x="58" y="130" width="184" height="0.5" fill="#C9A961" opacity="0.35"/>
  <rect x="58" y="328" width="184" height="0.5" fill="#C9A961" opacity="0.35"/>

  <!-- Label panel -->
  <rect x="70" y="142" width="160" height="168" rx="2" fill="rgba(0,0,0,0.3)"/>
  <rect x="70" y="142" width="160" height="168" rx="2" stroke="#C9A961" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Mughal arch ornament -->
  <path d="M150 162 Q175 180 175 210 Q175 238 150 254 Q125 238 125 210 Q125 180 150 162Z"
    stroke="#C9A961" stroke-width="0.5" stroke-opacity="0.3" fill="none"/>
  <path d="M150 170 Q168 185 168 210 Q168 232 150 246 Q132 232 132 210 Q132 185 150 170Z"
    stroke="#C9A961" stroke-width="0.4" stroke-opacity="0.2" fill="none"/>

  <!-- Saffron threads suggestion -->
  <line x1="136" y1="192" x2="164" y2="228" stroke="#C9A961" stroke-width="0.5" opacity="0.3"/>
  <line x1="150" y1="188" x2="150" y2="232" stroke="#C9A961" stroke-width="0.5" opacity="0.3"/>
  <line x1="164" y1="192" x2="136" y2="228" stroke="#C9A961" stroke-width="0.5" opacity="0.3"/>

  <!-- Center jewel -->
  <circle cx="150" cy="210" r="8" fill="rgba(201,169,97,0.2)" stroke="#C9A961" stroke-width="0.5" stroke-opacity="0.5"/>
  <circle cx="150" cy="210" r="3" fill="#C9A961" opacity="0.4"/>

  <!-- Cardamom pods (small ovals) -->
  <ellipse cx="130" cy="175" rx="4" ry="6" fill="#C9A961" opacity="0.2" transform="rotate(-20 130 175)"/>
  <ellipse cx="170" cy="175" rx="4" ry="6" fill="#C9A961" opacity="0.2" transform="rotate(20 170 175)"/>
  <ellipse cx="130" cy="245" rx="4" ry="6" fill="#C9A961" opacity="0.2" transform="rotate(20 130 245)"/>
  <ellipse cx="170" cy="245" rx="4" ry="6" fill="#C9A961" opacity="0.2" transform="rotate(-20 170 245)"/>

  <!-- Product name lines -->
  <rect x="100" y="256" width="100" height="1" fill="#C9A961" opacity="0.45"/>
  <rect x="114" y="262" width="72" height="0.5" fill="#C9A961" opacity="0.28"/>
  <rect x="122" y="284" width="56" height="0.75" fill="#C9A961" opacity="0.2"/>

  <!-- Lid pin dots -->
  <circle cx="58" cy="80" r="2" fill="#C9A961" opacity="0.55"/>
  <circle cx="242" cy="80" r="2" fill="#C9A961" opacity="0.55"/>
</svg>
