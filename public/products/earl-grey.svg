<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" fill="none">
  <defs>
    <linearGradient id="body-eg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1228"/>
      <stop offset="50%" stop-color="#1a2444"/>
      <stop offset="100%" stop-color="#0d1228"/>
    </linearGradient>
    <linearGradient id="lid-eg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1020"/>
      <stop offset="50%" stop-color="#1a1e38"/>
      <stop offset="100%" stop-color="#0d1020"/>
    </linearGradient>
    <radialGradient id="glow-eg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A6BAE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4A6BAE" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow-eg" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <ellipse cx="150" cy="300" rx="80" ry="40" fill="url(#glow-eg)" opacity="0.6"/>

  <!-- Tin body -->
  <rect x="58" y="90" width="184" height="290" rx="6" fill="url(#body-eg)" filter="url(#shadow-eg)"/>

  <!-- Lid -->
  <rect x="44" y="62" width="212" height="36" rx="5" fill="url(#lid-eg)"/>
  <rect x="56" y="72" width="188" height="18" rx="3" fill="#0d1228"/>

  <!-- Gold accent lines -->
  <rect x="44" y="96" width="212" height="1.5" fill="#C9A961" opacity="0.85"/>
  <rect x="44" y="374" width="212" height="1.5" fill="#C9A961" opacity="0.85"/>
  <rect x="58" y="130" width="184" height="0.5" fill="#C9A961" opacity="0.3"/>
  <rect x="58" y="328" width="184" height="0.5" fill="#C9A961" opacity="0.3"/>

  <!-- Label panel -->
  <rect x="70" y="142" width="160" height="168" rx="2" fill="rgba(0,0,0,0.3)"/>
  <rect x="70" y="142" width="160" height="168" rx="2" stroke="#C9A961" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Concentric ring ornament -->
  <circle cx="150" cy="210" r="50" stroke="#C9A961" stroke-width="0.4" stroke-opacity="0.35"/>
  <circle cx="150" cy="210" r="38" stroke="#C9A961" stroke-width="0.4" stroke-opacity="0.25"/>
  <circle cx="150" cy="210" r="22" stroke="#C9A961" stroke-width="0.4" stroke-opacity="0.2"/>

  <!-- Tea leaf motif (stylized) -->
  <path d="M150 192 C155 200 155 218 150 226 C145 218 145 200 150 192Z" fill="#C9A961" opacity="0.25"/>
  <path d="M140 202 C148 204 162 216 166 222 C158 220 144 208 140 202Z" fill="#C9A961" opacity="0.18"/>
  <path d="M160 202 C152 204 138 216 134 222 C142 220 156 208 160 202Z" fill="#C9A961" opacity="0.18"/>

  <!-- Product name lines (representing text) -->
  <rect x="100" y="248" width="100" height="1" fill="#C9A961" opacity="0.4"/>
  <rect x="114" y="254" width="72" height="0.5" fill="#C9A961" opacity="0.25"/>
  <rect x="122" y="282" width="56" height="0.75" fill="#C9A961" opacity="0.2"/>

  <!-- Corner pin dots on lid -->
  <circle cx="58" cy="80" r="2" fill="#C9A961" opacity="0.5"/>
  <circle cx="242" cy="80" r="2" fill="#C9A961" opacity="0.5"/>
</svg>
